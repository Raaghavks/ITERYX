version: '3.8'

services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hospital_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file: .env
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      # Please define your frontend Dockerfile when ready
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file: .env

volumes:
  postgres_data:
